<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Smart Lost & Found | NIT Silchar</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col items-center p-8">
    <nav class="w-full bg-blue-800 p-4 text-white flex justify-center space-x-8 mb-8 shadow-lg">
    <a href="#" onclick="showPage('report')" class="hover:underline font-semibold">Report Product</a>
    <a href="#" onclick="showPage('status')" class="hover:underline font-semibold">Status Board</a>
</nav>

<div id="reportPage" class="flex flex-col items-center px-4">
    <h1 class="text-3xl font-bold text-blue-800 mb-8">Lost & Found/NIT Silchar</h1>

    <div class="bg-white p-6 rounded-lg shadow-md w-full max-w-md">
        <h2 class="text-xl font-semibold mb-4">Report a Product</h2>
        
        <form id="itemForm" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700">Product Name</label>
                <input type="text" id="title" placeholder="e.g. Blue Dell Laptop" 
                    class="w-full border p-2 rounded-md focus:ring-2 focus:ring-blue-500 outline-none" required>
            </div>


            <div>
                <label class="block text-sm font-medium text-gray-700">Category</label>
                <select id="category" class="w-full border p-2 rounded-md outline-none" required>
                    <option value="">Select a category</option>
                    <option value="Electronics">Electronics</option>
                    <option value="Keys">Keys</option>
                    <option value="Wallet">Wallet/Bags</option>
                    <option value="Documents">Documents/ID Cards</option>
                    <option value="General products">General Products</option>
                </select>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700">Location</label>
                <input type="text" id="location" placeholder="e.g.Gymkhana Park" 
                    class="w-full border p-2 rounded-md outline-none" required>
            </div>
             <div>
                <label class="block text-sm font-medium text-gray-700">Date</label>
                <input type="date" id="date"  
                    class="w-full border p-2 rounded-md outline-none focus:ring-2 focus:ring-blue-500">
            </div>
                         <div>
                <label class="block text-sm font-medium text-gray-700">Approximate Time</label>
                <input type="time" id="time"  
                    class="w-full border p-2 rounded-md outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <div>
                <label class=""block text-sm font-medium text-gray-700>Upload Image</label>
                <input type="file" id="itemimage" accept="image/*" class="w-full border p-2 rounded-md outline-none cursor-pointer file:mr-4 file:py-2 file:px-4 file:rounded-md file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100">
            </div>
              <div class="mb-4">
    <label class="block text-gray-700 text-sm font-bold mb-2">Contact Info (Phone/Email)</label>
    <input type="text" id="itemContact" placeholder="e.g., +91 98765 43210" 
           class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" required>
</div>

            <div>
                <label class="block text-sm font-medium text-gray-700">Product Status</label>
                <select id="type" class="w-full border p-2 rounded-md outline-none" required>
                    <option value="lost">Lost this product</option>
                    <option value="found">Found this product</option>
                </select>
            </div>

            <button type="submit" class="w-full bg-blue-600 text-white py-2 rounded-md hover:bg-blue-700 transition">
                Submit Report
            </button>
        </form>
    </div>
    </div>
      <div id="statusPage" class="hidden w-full max-w-6xl mx-auto px-4">
        <div class="max-w-6xl mx-auto mb-8 px-4 flex flex-col md:flex-row gap-4">
    <input type="text" id="searchInput" onkeyup="filterItems()" placeholder="Search items or locations..." 
           class="flex-1 p-3 border rounded-xl shadow-sm focus:ring-2 focus:ring-blue-500">
    
    <select id="filterCategory" onchange="filterItems()" class="p-3 border rounded-xl shadow-sm bg-white">
        <option value="all">All Categories</option>
        <option value="Electronics">Electronics</option>
         <option value="keys">Keys</option>
          <option value="wallet/bag">Wallet/bags</option>
        <option value="Documents">Documents/ID Cards</option>
        <option value="genralproducts">General Products</option>
    </select>
</div>
        <h2 class="text-2xl font-bold text-center text-gray-800 mb-8">Campus Status Board</h2>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <div>
                <h3 class="text-xl font-bold text-red-700 mb-4 border-b-2 border-red-200">Lost Product</h3>
                <div id="lostList" class="space-y-4">
                    <p class="text-gray-500 italic">No lost products reported yet.</p>
                </div>
            </div>

            <div>
                <h3 class="text-xl font-bold text-green-700 mb-4 border-b-2 border-green-200">Found Products</h3>
                <div id="foundList" class="space-y-4">
                    <p class="text-gray-500 italic">No found products reported yet.</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        function showPage(pageId) {
            const reportPage = document.getElementById('reportPage');
            const statusPage = document.getElementById('statusPage');

            if (pageId === 'report') {
                reportPage.classList.remove('hidden');
                statusPage.classList.add('hidden');
            } else {
                statusPage.classList.remove('hidden');
                reportPage.classList.add('hidden');
            }
        }
    </script>
   <div id="itemModal" class="hidden fixed inset-0 bg-black bg-opacity-60 flex items-center justify-center p-4 z-50">
        <div class="bg-white rounded-2xl max-w-md w-full p-8 shadow-2xl relative animate-in fade-in zoom-in duration-300">
            <button onclick="closeModal()" class="absolute top-4 right-4 text-gray-400 hover:text-black text-2xl font-bold">&times;</button>
            <div id="modalContent"></div>
        </div>
    </div>
<script>
        
        let items = [];

    
    function showPage(pageId) {
        const reportPage = document.getElementById('reportPage');
        const statusPage = document.getElementById('statusPage');

        if (pageId === 'report') {
            reportPage.classList.remove('hidden');
            statusPage.classList.add('hidden');
        } else {
            statusPage.classList.remove('hidden');
            reportPage.classList.add('hidden');
            renderItems(); 
        }
    }

    const itemForm = document.getElementById('itemForm');
    itemForm.addEventListener('submit', function(e) {
        e.preventDefault(); 

        // 1. CAPTURE THE IMAGE FILE
        const imageInput = document.getElementById('itemimage');
        let imageURL = "";
        if (imageInput.files && imageInput.files[0]) {
            // Create a temporary local URL for the image
            imageURL = URL.createObjectURL(imageInput.files[0]);
        }

        const newItem = {
            title: document.getElementById('title').value,
            category: document.getElementById('category').value,
            location: document.getElementById('location').value,
            type: document.getElementById('type').value, 
            date: document.getElementById('date').value,
            time: document.getElementById('time').value,
            contact: document.getElementById('itemContact').value,
            image: imageURL, // Store the image URL
            status: document.getElementById('type').value === 'lost' ? 'Searching...' : 'Pending Claim'
        };


        items.push(newItem);
      
        const isMatch = items.some(existingItem => {
            const oppositeType = existingItem.type !== newItem.type;
            const titleMatch = existingItem.title.toLowerCase().includes(newItem.title.toLowerCase()) || 
                               newItem.title.toLowerCase().includes(existingItem.title.toLowerCase());
            return oppositeType && titleMatch;
        });

        if (isMatch) {
            alert("🔍 SMART MATCH FOUND!\nSomeone has already reported a similar item. Check the Status Board!");
        }
        
        alert("Report submitted successfully!");
        itemForm.reset();
        showPage('status'); 
    });
     
    function filterItems() {
        const searchTerm = document.getElementById('searchInput').value.toLowerCase();
        const categoryTerm = document.getElementById('filterCategory').value;
        const allCards = document.querySelectorAll('#lostList > div, #foundList > div');

        allCards.forEach(card => {
            const cardText = card.innerText.toLowerCase();
            const matchesSearch = cardText.includes(searchTerm);
            const categoryTag = card.querySelector('.category-tag').innerText;
            const matchesCategory = categoryTerm === 'all' || categoryTag === categoryTerm.toUpperCase();

            card.style.display = (matchesSearch && matchesCategory) ? "block" : "none";
        });
    }

    function renderItems() {
    const lostList = document.getElementById('lostList');
    const foundList = document.getElementById('foundList');

    lostList.innerHTML = '';
    foundList.innerHTML = '';

    if (items.length === 0) {
        lostList.innerHTML = '<p class="text-gray-500 italic text-center">No lost items reported.</p>';
        foundList.innerHTML = '<p class="text-gray-500 italic text-center">No found items reported.</p>';
        return;
    }

    items.forEach(item => {
        const cardColor = item.type === 'lost' ? 'border-red-500' : 'border-green-500';
        const statusColor = item.type === 'lost' ? 'text-orange-600' : 'text-green-600';


        // This part handles the image display
        let imageHTML = '';
        if (item.image) {
            imageHTML = `<img src="${item.image}" class="w-full h-48 object-cover rounded-lg mb-3 shadow-sm" alt="Product Image">`;
        } else {
            imageHTML = `<div class="w-full h-24 bg-gray-100 flex items-center justify-center rounded-lg mb-3 text-gray-400 text-xs">No Image Provided</div>`;
        }

        const cardHTML = `
            <div class="bg-white p-4 rounded-xl shadow-md border-l-4 ${cardColor} mb-4 transition-all hover:scale-[1.01]">
                ${imageHTML}
                <div class="flex justify-between items-start">
                    <h4 class="font-bold text-gray-800 text-lg">${item.title}</h4>
                    <span class="category-tag text-[10px] px-2 py-1 rounded bg-blue-50 text-blue-700 font-bold uppercase">${item.category}</span>
                </div>
                <p class="text-sm text-gray-600 mt-1">📍 ${item.location}</p>
                <p class="text-sm text-blue-600 mt-2 font-semibold">📞 ${item.contact}</p>
                <div class="flex gap-4 mt-2 text-[10px] text-gray-400 border-t pt-2">
                    <span>📅 ${item.date || 'N/A'}</span>
                    <span>⏰ ${item.time || 'N/A'}</span>
                </div>
                <p class="mt-3 text-sm font-bold ${statusColor}">Status: ${item.status}</p>
            </div>
            `;
           
        
        

        if (item.type === 'lost') {
            lostList.innerHTML += cardHTML;
        } else {
            foundList.innerHTML += cardHTML;
        }
    });
}

      
  


    </script>
</body>
</html>
