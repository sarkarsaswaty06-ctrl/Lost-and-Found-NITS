<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Lost & Found | NIT Silchar</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col items-center p-8">
    
    <nav class="w-full bg-blue-800 p-4 text-white flex justify-center space-x-8 mb-8 shadow-md">
        <a href="#" onclick="showPage('report')" class="hover:underline font-semibold">Report Product</a>
        <a href="#" onclick="showPage('status')" class="hover:underline font-semibold">Status Board</a>
    </nav>

    <div id="reportPage" class="flex flex-col items-center px-4 w-full">
        <h1 class="text-3xl font-bold text-blue-800 mb-8">Lost & Found | NIT Silchar</h1>
        
        <div class="bg-white p-6 rounded-lg shadow-md w-full max-w-md">
            <h2 class="text-xl font-semibold mb-4 border-b pb-2">Report a Product</h2>
            <form id="itemForm" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700">Product Name</label>
                    <input type="text" id="title" placeholder="e.g. Blue Dell Laptop" class="w-full border p-2 rounded-md outline-none focus:ring-2 focus:ring-blue-500" required>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Category</label>
                        <select id="category" class="w-full border p-2 rounded-md outline-none" required>
                            <option value="">Select</option>
                            <option value="Electronics">Electronics</option>
                            <option value="Keys">Keys</option>
                            <option value="Wallet">Wallet/Bags</option>
                            <option value="Documents">Documents</option>
                            <option value="General">General</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Status</label>
                        <select id="type" class="w-full border p-2 rounded-md outline-none" required>
                            <option value="lost">Lost</option>
                            <option value="found">Found</option>
                        </select>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700">Location</label>
                    <input type="text" id="location" placeholder="e.g. Gymkhana Park" class="w-full border p-2 rounded-md outline-none" required>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Date</label>
                        <input type="date" id="date" class="w-full border p-2 rounded-md outline-none" required>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Approx Time</label>
                        <input type="time" id="time" class="w-full border p-2 rounded-md outline-none" required>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700">Product Image URL</label>
                    <input type="url" id="itemImage" placeholder="Paste image link here" class="w-full border p-2 rounded-md outline-none">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700">Contact Info</label>
                    <input type="text" id="itemContact" placeholder="Phone or Email" class="w-full border p-2 rounded-md outline-none" required>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 text-blue-600 font-bold">Secret Description (Claim Key)</label>
                    <textarea id="description" rows="2" placeholder="Enter a secret detail that only the owner would know (e.g., 'Spiderman sticker on back')" class="w-full border-2 border-blue-200 p-2 rounded-md outline-none focus:border-blue-500" required></textarea>
                    <p class="text-[10px] text-gray-500 mt-1">*This description will be hidden from everyone and used to verify claims.</p>
                </div>

                <button type="submit" class="w-full bg-blue-600 text-white py-2 rounded-md hover:bg-blue-700 font-bold transition">
                    Submit Report
                </button>
            </form>
        </div>
    </div>

    <div id="statusPage" class="hidden w-full max-w-6xl mx-auto px-4">
        <div class="flex flex-col md:flex-row gap-4 mb-8">
            <input type="text" id="searchInput" onkeyup="filterItems()" placeholder="Search items..." class="flex-1 p-3 border rounded-xl shadow-sm outline-none">
            <select id="filterCategory" onchange="filterItems()" class="p-3 border rounded-xl shadow-sm outline-none">
                <option value="all">All Categories</option>
                <option value="Electronics">Electronics</option>
                <option value="Keys">Keys</option>
                <option value="Wallet">Wallet/Bags</option>
                <option value="Documents">Documents</option>
                <option value="General">General</option>
            </select>
        </div>

        <h2 class="text-2xl font-bold text-center text-gray-800 mb-8 uppercase tracking-widest">Campus Status Board</h2>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <div>
                <h3 class="text-xl font-bold text-red-700 mb-4 border-b-2 border-red-200 pb-2">Lost Items</h3>
                <div id="lostList" class="space-y-4"></div>
            </div>
            <div>
                <h3 class="text-xl font-bold text-green-700 mb-4 border-b-2 border-green-200 pb-2">Found Items</h3>
                <div id="foundList" class="space-y-4"></div>
            </div>
        </div>
    </div>

    <script>
        let items = [];

        function showPage(pageId) {
            document.getElementById('reportPage').classList.toggle('hidden', pageId !== 'report');
            document.getElementById('statusPage').classList.toggle('hidden', pageId !== 'status');
            if(pageId === 'status') renderItems();
        }

        document.getElementById('itemForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const newItem = {
                id: Date.now(),
                title: document.getElementById('title').value,
                category: document.getElementById('category').value,
                location: document.getElementById('location').value,
                date: document.getElementById('date').value,
                time: document.getElementById('time').value,
                description: document.getElementById('description').value.trim(),
                contact: document.getElementById('itemContact').value,
                type: document.getElementById('type').value,
                image: document.getElementById('itemImage').value,
                isVerified: false
            };

            const isMatch = items.some(existingItem => {
                return existingItem.type !== newItem.type && 
                       existingItem.title.toLowerCase().includes(newItem.title.toLowerCase());
            });

            if (isMatch) alert("🔍 SMART MATCH FOUND!Someone has reported a similar product.Check the Status Board.");

            items.push(newItem);
            alert("Report added. The description is now a secret key for verification.");
            this.reset();
            showPage('status');
        });

        function filterItems() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const categoryTerm = document.getElementById('filterCategory').value;
            const allCards = document.querySelectorAll('#lostList > div, #foundList > div');

            allCards.forEach(card => {
                const text = card.innerText.toLowerCase();
                const category = card.querySelector('.category-tag').innerText;
                const matches = text.includes(searchTerm) && (categoryTerm === 'all' || category === categoryTerm);
                card.style.display = matches ? "block" : "none";
            });
        }

        function renderItems() {
            const lostList = document.getElementById('lostList');
            const foundList = document.getElementById('foundList');
            lostList.innerHTML = ''; foundList.innerHTML = '';

            if (items.length === 0) {
                const emptyMsg = '<p class="text-gray-500 italic text-center">No reports yet.</p>';
                lostList.innerHTML = emptyMsg; foundList.innerHTML = emptyMsg;
                return;
            }

            items.forEach(item => {
                const cardColor = item.type === 'lost' ? 'border-red-500' : 'border-green-500';
                
                // Image Logic
                const imageContent = item.image ? `
                    <div class="relative w-full h-48 mt-3 rounded-lg overflow-hidden bg-gray-200">
                        <img src="${item.image}" class="w-full h-full object-cover ${item.isVerified ? '' : 'blur-xl opacity-40'}">
                        ${!item.isVerified ? '<div class="absolute inset-0 flex items-center justify-center"><span class="bg-white/90 text-[10px] font-bold px-3 py-1 rounded-full shadow-sm">HIDDEN</span></div>' : ''}
                    </div>` : '';

                // Contact & Secret Description Logic
                const secretContent = item.isVerified 
                    ? `<div class="bg-green-50 p-3 rounded-md mt-3 border border-green-200">
                         <p class="text-[11px] text-green-700 font-bold uppercase">✅ Verified Details:</p>
                         <p class="text-xs text-gray-700 mt-1"><strong>Desc:</strong> ${item.description}</p>
                         <p class="text-sm text-blue-900 font-bold mt-1">📞 ${item.contact}</p>
                       </div>`
                    : `<div class="mt-4 pt-3 border-t">
                         <p class="text-[10px] text-gray-400 italic mb-2">Description & Contact are hidden. Enter the secret detail to unlock.</p>
                         <button onclick="claimItem(${item.id})" class="w-full bg-blue-600 text-white py-1.5 rounded text-xs font-bold hover:bg-blue-700 transition">CLAIM ITEM</button>
                       </div>`;

                const cardHTML = `
                    <div class="bg-white p-5 rounded-xl shadow-sm border-l-4 ${cardColor}">
                        <div class="flex justify-between items-start">
                            <h4 class="font-bold text-gray-800 text-lg">${item.title}</h4>
                            <span class="category-tag text-[10px] px-2 py-1 rounded bg-gray-100 font-bold text-gray-500">${item.category}</span>
                        </div>
                        ${imageContent}
                        <div class="mt-3 space-y-1">
                            <p class="text-sm text-gray-600">📍 ${item.location}</p>
                            <div class="flex gap-4 text-[10px] text-gray-400 font-semibold">
                                <span>📅 ${item.date}</span> <span>⏰ ${item.time}</span>
                            </div>
                        </div>
                        ${secretContent}
                    </div>`;

                item.type === 'lost' ? lostList.innerHTML += cardHTML : foundList.innerHTML += cardHTML;
            });
        }

        function claimItem(itemId) {
            const userAttempt = prompt("To verify ownership, enter the secret description detail (e.g., specific marks, stickers, or wallpaper):");
            
            if (userAttempt) {
                const item = items.find(i => i.id === itemId);
                // Case-insensitive match check
                if (userAttempt.trim().toLowerCase() === item.description.toLowerCase()) {
                    item.isVerified = true;
                    alert("✅ MATCH FOUND! Verification successful. Contact and full details are now visible.");
                    renderItems();
                } else {
                    alert("❌ INCORRECT DETAIL. Verification failed. If you are the owner, try to be more specific.");
                }
            }
        }
    </script>
</body>
</html>
